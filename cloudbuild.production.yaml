# FITT Builder — Cloud Build → Cloud Run (PRODUCTION).
# Simple mode: ALL config (incl. API keys) comes from substitution variables set
# in the Cloud Build Trigger UI — no Secret Manager. Cost-optimized: scale-to-zero,
# 512Mi, default build pool (free 120 build-min/day), Cloud Logging only.
#
# ── SETUP (once) ──────────────────────────────────────────────────────────────
# A) The trigger's user-managed service account needs these project roles:
#      roles/logging.logWriter  roles/artifactregistry.writer  roles/run.admin
#    and act-as on the Cloud Run runtime SA:
#      gcloud iam service-accounts add-iam-policy-binding \
#        <PROJECT_NUMBER>-compute@developer.gserviceaccount.com \
#        --member="serviceAccount:<build-sa>@<PROJECT_ID>.iam.gserviceaccount.com" \
#        --role="roles/iam.serviceAccountUser"
# B) In the trigger → Advanced → Substitution variables, set (override below):
#      _NEXT_PUBLIC_SUPABASE_URL, _NEXT_PUBLIC_SUPABASE_ANON_KEY, _ADMIN_EMAILS,
#      _GEMINI_API_KEY, _SUPABASE_SERVICE_ROLE_KEY
#    (the keys live in the trigger config — keep that trigger access-restricted).
# C) After the first deploy, add the service URL to Supabase → Auth → URL
#    Configuration → Redirect URLs:  https://<service-url>/auth/callback
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE: "fitt-builder"
  _REGION: "asia-southeast1"
  _MAX_INSTANCES: "3"
  # Public (shipped to the browser) — safe to commit.
  _NEXT_PUBLIC_SUPABASE_URL: "https://YOUR-PROJECT.supabase.co"
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: "YOUR_SUPABASE_ANON_KEY"
  _GEMINI_MODEL: "gemini-2.5-flash"
  _ADMIN_EMAILS: "YOUR_ADMIN_EMAILS"
  # Sensitive — SET THESE IN THE TRIGGER UI, do not commit real values here.
  _GEMINI_API_KEY: "SET_IN_TRIGGER"
  _SUPABASE_SERVICE_ROLE_KEY: "SET_IN_TRIGGER"

steps:
  # ==================== PREFLIGHT ====================
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: preflight
    entrypoint: bash
    args:
      - -c
      - |
        miss=
        for v in "${_NEXT_PUBLIC_SUPABASE_URL}" "${_NEXT_PUBLIC_SUPABASE_ANON_KEY}" "${_ADMIN_EMAILS}" "${_GEMINI_API_KEY}" "${_SUPABASE_SERVICE_ROLE_KEY}"; do
          case "$v" in *YOUR*|SET_IN_TRIGGER|"") miss=1;; esac
        done
        if [ -n "$miss" ]; then
          echo "ERROR: set _NEXT_PUBLIC_SUPABASE_URL, _NEXT_PUBLIC_SUPABASE_ANON_KEY, _ADMIN_EMAILS, _GEMINI_API_KEY, _SUPABASE_SERVICE_ROLE_KEY in the trigger before deploying." >&2
          exit 1
        fi
        echo "preflight ok"

  # ==================== BUILD ====================
  # NEXT_PUBLIC_* are inlined into the client bundle at build time → build args.
  # $BUILD_ID is always set (manual submit AND triggers); $COMMIT_SHA is not.
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [preflight]
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - -f
      - Dockerfile
      - .

  # ==================== PUSH ====================
  - name: gcr.io/cloud-builders/docker
    id: push-build
    args: [push, "gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID"]
    waitFor: [build]
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args: [push, "gcr.io/$PROJECT_ID/${_SERVICE}:latest"]
    waitFor: [build]

  # ==================== DEPLOY ====================
  # Everything via --set-env-vars (^|^ delimiter so ADMIN_EMAILS' commas survive).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"
      - --cpu
      - "1"
      - --memory
      - 512Mi
      - --min-instances
      - "0"
      - --max-instances
      - ${_MAX_INSTANCES}
      - --concurrency
      - "80"
      - --timeout
      - "900"
      - --set-env-vars
      - >-
        ^|^NODE_ENV=production|GEMINI_MODEL=${_GEMINI_MODEL}|ADMIN_EMAILS=${_ADMIN_EMAILS}|NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}|NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}|GEMINI_API_KEY=${_GEMINI_API_KEY}|SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}
    waitFor: [push-build]

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE
  # No machineType → default Cloud Build pool (free 120 build-min/day).

timeout: "1800s"
