# FITT Builder — Cloud Build → Cloud Run (SANDBOX).
# Simple mode: ALL config (incl. API keys) via substitution variables set in the
# Cloud Build Trigger UI — no Secret Manager. Same cost-optimized shape as
# production (scale-to-zero, 512Mi, free build pool, Cloud Logging only).
#
# SETUP: same as cloudbuild.production.yaml (build SA roles, then set the
# substitutions below in the trigger). After deploy, add
# https://<sandbox-url>/auth/callback to Supabase → Auth → Redirect URLs.
#
# In the trigger → Advanced → Substitution variables, set:
#   _NEXT_PUBLIC_SUPABASE_URL, _NEXT_PUBLIC_SUPABASE_ANON_KEY, _ADMIN_EMAILS,
#   _GEMINI_API_KEY, _SUPABASE_SERVICE_ROLE_KEY
# (For data isolation you can point these at a separate Supabase project — $0 extra.)
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE: "fitt-builder-sandbox"
  _REGION: "asia-southeast1"
  _MAX_INSTANCES: "1"
  _NEXT_PUBLIC_SUPABASE_URL: "https://YOUR-PROJECT.supabase.co"
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: "YOUR_SUPABASE_ANON_KEY"
  _GEMINI_MODEL: "gemini-2.5-flash"
  _ADMIN_EMAILS: "YOUR_ADMIN_EMAILS"
  # Sensitive — SET THESE IN THE TRIGGER UI.
  _GEMINI_API_KEY: "SET_IN_TRIGGER"
  _SUPABASE_SERVICE_ROLE_KEY: "SET_IN_TRIGGER"

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: preflight
    entrypoint: bash
    args:
      - -c
      - |
        miss=
        for v in "${_NEXT_PUBLIC_SUPABASE_URL}" "${_NEXT_PUBLIC_SUPABASE_ANON_KEY}" "${_ADMIN_EMAILS}" "${_GEMINI_API_KEY}" "${_SUPABASE_SERVICE_ROLE_KEY}"; do
          case "$v" in *YOUR*|SET_IN_TRIGGER|"") miss=1;; esac
        done
        if [ -n "$miss" ]; then
          echo "ERROR: set _NEXT_PUBLIC_SUPABASE_URL, _NEXT_PUBLIC_SUPABASE_ANON_KEY, _ADMIN_EMAILS, _GEMINI_API_KEY, _SUPABASE_SERVICE_ROLE_KEY in the trigger before deploying." >&2
          exit 1
        fi
        echo "preflight ok"

  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [preflight]
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - -f
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-build
    args: [push, "gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID"]
    waitFor: [build]
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args: [push, "gcr.io/$PROJECT_ID/${_SERVICE}:latest"]
    waitFor: [build]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"
      - --cpu
      - "1"
      - --memory
      - 512Mi
      - --min-instances
      - "0"
      - --max-instances
      - ${_MAX_INSTANCES}
      - --concurrency
      - "80"
      - --timeout
      - "900"
      # Clear secret-type env vars from any earlier --set-secrets deploy so the
      # same keys can be set as string literals below without a type conflict.
      - --clear-secrets
      - --set-env-vars
      - >-
        ^|^NODE_ENV=production|GEMINI_MODEL=${_GEMINI_MODEL}|ADMIN_EMAILS=${_ADMIN_EMAILS}|NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}|NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}|GEMINI_API_KEY=${_GEMINI_API_KEY}|SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}
    waitFor: [push-build]

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE

timeout: "1800s"
